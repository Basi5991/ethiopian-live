# Render Blueprint — ELLIOT / Terjuman.live
# Connect your GitHub repo in Render Dashboard → New → Blueprint → select this file.

databases:
  - name: terjuman-db
    databaseName: terjuman
    user: terjuman
    plan: free

services:
  - type: web
    name: elliot-live
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn terjuman.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/init
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: terjuman-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
