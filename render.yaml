# Render Blueprint — ELLIOT / Terjuman.live
# Connect your GitHub repo in Render Dashboard → New → Blueprint → select this file.

databases:
  - name: terjuman-db
    databaseName: terjuman
    user: terjuman
    plan: free

services:
  - type: web
    name: elliot-live
    runtime: python
    plan: free
    buildCommand: bash build.sh
    # WebSocket calls require ASGI (Daphne). Gunicorn WSGI cannot serve /ws/calls/.
    startCommand: bash start.sh
    # Lightweight probe — /api/init hits the DB and is too slow for cold-start health checks.
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "elliot-live.onrender.com,.onrender.com,localhost,127.0.0.1"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: terjuman-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
