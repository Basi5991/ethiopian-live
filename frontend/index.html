<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23059669"/><text x="32" y="43" text-anchor="middle" font-size="34" font-family="Arial" font-weight="700" fill="white">T</text></svg>' />
    <title>ELLIOT | Terjuman.live</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback" hidden style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.75rem;font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;text-align:center;padding:1.5rem">
      <strong>Server is starting up</strong>
      <span style="opacity:0.75;font-size:0.875rem">Free hosting can take up to a minute after idle. Retrying automatically…</span>
    </div>
    <script>
      (function () {
        var retries = 0;
        var maxRetries = 15;
        var fallback = document.getElementById("boot-fallback");
        function showFallback() {
          if (fallback) fallback.hidden = false;
        }
        window.addEventListener(
          "error",
          function (event) {
            var target = event.target;
            if (!target || (target.tagName !== "SCRIPT" && target.tagName !== "LINK")) return;
            showFallback();
            if (retries++ < maxRetries) {
              setTimeout(function () {
                location.reload();
              }, 4000);
            }
          },
          true
        );
        setTimeout(function () {
          var root = document.getElementById("root");
          if (root && !root.innerHTML.trim()) showFallback();
        }, 10000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
